<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme.js"></script>
    <title>AetherVest - Profile</title>
 
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
 
    <!-- Custom CSS -->
    <link rel="icon" type="image/jpeg" href="images/logo.jpeg">
    <link rel="stylesheet" href="css/style.css">
</head>
 
<body>
 
<div class="container-fluid">
    <div class="row vh-100">
 
        <!-- SIDEBAR -->
        <aside class="col-lg-2 sidebar p-0">
 
            <div class="logo-section p-4">
                <img src="images/logo.jpeg" alt="AetherVest" class="sidebar-logo">
            </div>
 
            <nav class="nav flex-column px-3 mt-3">
 
                <a href="index.html" class="nav-link">
                    🏠 Dashboard
                </a>
 
                <a href="news.html" class="nav-link">
                    📰 News
                </a>
 
                <a href="stock.html" class="nav-link">
                    📈 Markets
                </a>
 
                <a href="portfolio.html" class="nav-link">
                    💼 Portfolio
                </a>
 
                <a href="profile.html" class="nav-link active-nav">
                    👤 Profile
                </a>
 
            </nav>
 
        </aside>
 
        <!-- MAIN CONTENT -->
        <main class="col-lg-10 p-0">
 
            <section class="dashboard-content p-4">
 
                <div class="mb-4 d-flex justify-content-between align-items-center">
                    <h1 class="fw-bold m-0">Profile</h1>
                    <button class="theme-toggle-btn" id="themeToggleBtn" title="Toggle theme"></button>
                </div>
 
                <!-- Profile card -->
                <div class="market-card mb-4 d-flex align-items-center justify-content-between flex-wrap gap-3">
 
                    <div class="d-flex align-items-center gap-3">
 
                        <div class="profile-avatar">
                            SV
                        </div>
 
                        <div>
                            <h5 class="m-0 fw-bold">Sofia Vergara</h5>
                            <p class="m-0">sofia.vergara@email.com</p>
                        </div>
 
                    </div>
 
                    <button class="btn btn-outline-light btn-sm" id="editProfileBtn">
                        Edit Profile
                    </button>
 
                </div>
 
                <!-- Notifications -->
                <h6 class="section-eyebrow mb-3">Notifications</h6>
 
                <div class="market-card mb-4">
 
                    <div class="d-flex justify-content-between align-items-center py-2">
                        <span>Push Notifications</span>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="pushToggle" checked>
                        </div>
                    </div>
 
                    <hr class="settings-divider">
 
                    <div class="d-flex justify-content-between align-items-center py-2">
                        <span>Price Alerts</span>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="priceAlertsToggle" checked>
                        </div>
                    </div>
 
                </div>
 
                <!-- Account -->
                <h6 class="section-eyebrow mb-3">Account</h6>
 
                <div class="market-card mb-4 p-0">
 
                    <a href="#" class="settings-row">
                        <span>Payment Methods</span>
                        <span class="settings-chevron">&rsaquo;</span>
                    </a>
 
                    <a href="#" class="settings-row">
                        <span>Security &amp; Privacy</span>
                        <span class="settings-chevron">&rsaquo;</span>
                    </a>
 
                    <a href="premium.html" class="settings-row settings-row-highlight">
                        <span>Upgrade to AetherPro</span>
                        <span class="settings-chevron">&rsaquo;</span>
                    </a>
 
                </div>
 
                <!-- Support -->
                <h6 class="section-eyebrow mb-3">Support</h6>
 
                <div class="market-card mb-4 p-0">
 
                    <a href="#" class="settings-row">
                        <span>Help Center</span>
                        <span class="settings-chevron">&rsaquo;</span>
                    </a>
 
                    <a href="#" class="settings-row">
                        <span>Contact Support</span>
                        <span class="settings-chevron">&rsaquo;</span>
                    </a>
 
                    <a href="#" class="settings-row">
                        <span>Rate App</span>
                        <span class="settings-chevron">&rsaquo;</span>
                    </a>
 
                </div>

                <!-- Log out -->
                <a href="login.html" class="btn btn-outline-danger w-100 mb-4">
                    🚪 Log out
                </a>
 
            </section>
 
        </main>
 
    </div>
</div>
 
<script src="js/profile.js"></script>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
 
</body>
</html>
