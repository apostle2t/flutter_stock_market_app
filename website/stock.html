<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme.js"></script>
    <title>AetherVest - Stock Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="icon" type="image/jpeg" href="images/logo.jpeg">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container-fluid">

    <div class="row vh-100">

        <!-- Sidebar -->

        <aside class="col-lg-2 sidebar p-0">

            <div class="logo-section p-4">
                <img src="images/logo.jpeg" alt="AetherVest" class="sidebar-logo">
            </div>

            <nav class="nav flex-column px-3 mt-3">

                <a href="index.html" class="nav-link">
                    🏠 Dashboard
                </a>

                <a href="news.html" class="nav-link">
                    📰 News
                </a>

                <a href="stock.html" class="nav-link active-nav">
                    📈 Markets
                </a>

                <a href="portfolio.html" class="nav-link">
                    💼 Portfolio
                </a>

                <a href="profile.html" class="nav-link">
                    👤 Profile
                </a>

            </nav>

        </aside>

        <!-- Main Content -->

        <main class="col-lg-10 p-0">

            <header class="topbar px-4 py-3">

                <div class="row align-items-center">

                    <div class="col-lg-4">
                        <h3 class="m-0">Stock Details</h3>
                    </div>

                    <div class="col-lg-7">
                        <input
                            type="text"
                            class="form-control"
                            id="searchInput"
                            placeholder="Search companies, symbols or countries..."
                        >
                    </div>

                    <div class="col-lg-1 d-flex justify-content-end mt-3 mt-lg-0">
                        <button class="theme-toggle-btn" id="themeToggleBtn" title="Toggle theme"></button>
                    </div>

                </div>

            </header>

            <section class="dashboard-content p-4">

                <div class="market-card mb-4">

                    <h2 id="stockSymbol">
                        Loading...
                    </h2>

                    <h1 id="stockPrice">
                        --
                    </h1>

                    <span id="stockChange">
                        --
                    </span>

                </div>

                <div class="chart-card mb-4">

                    <div class="d-flex justify-content-between align-items-center mb-3">

                        <h4 class="m-0" id="chartTitle">
                            Price Trend
                        </h4>

                        <div>

                            <button class="btn btn-sm btn-primary range-btn active" data-range="1D">
                                1D
                            </button>

                            <button class="btn btn-sm btn-outline-light range-btn" data-range="1M">
                                1M
                            </button>

                            <button class="btn btn-sm btn-outline-light range-btn" data-range="3M">
                                3M
                            </button>

                            <button class="btn btn-sm btn-outline-light range-btn" data-range="1Y">
                                1Y
                            </button>

                        </div>

                    </div>

                    <canvas id="stockChart"></canvas>

                </div>

                <div class="row g-3 mb-4">

                    <div class="col-md-6">
                        <button
                            class="btn btn-lg w-100"
                            id="buyBtn"
                            style="background-color: var(--aether-positive); color: white; border: none;"
                        >
                            Buy
                        </button>
                    </div>

                    <div class="col-md-6">
                        <button
                            class="btn btn-lg w-100"
                            id="sellBtn"
                            style="background-color: var(--aether-negative); color: white; border: none;"
                        >
                            Sell
                        </button>
                    </div>

                </div>

                <div id="countryStockList"></div>

            </section>

        </main>

    </div>

</div>

<!-- TRADE CONFIRMATION MODAL -->
<div class="modal" tabindex="-1" id="tradeModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content market-card text-center p-4">

            <div class="success-icon-circle" id="tradeIcon">✓</div>

            <h4 class="fw-bold mb-2" id="tradeModalTitle">Order Placed</h4>

            <p class="text-secondary mb-4" id="tradeMessage"></p>

            <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Done</button>

        </div>
    </div>
</div>

<script src="js/search.js"></script>
<script src="js/cache.js"></script>
<script src="js/stock.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
