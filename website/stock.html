<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherVest - Stock Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container-fluid">

    <div class="row vh-100">

        <!-- Sidebar -->

        <aside class="col-lg-2 sidebar p-0">

            <div class="logo-section p-4">
                <h3 class="fw-bold m-0">AetherVest</h3>
            </div>

            <nav class="nav flex-column px-3 mt-3">

                <a href="index.html" class="nav-link">
                    Dashboard
                </a>

                <a href="news.html" class="nav-link">
                    News
                </a>

                <a href="stock.html" class="nav-link active-nav">
                    Markets
                </a>

                <a href="portfolio.html" class="nav-link">
                    Portfolio
                </a>

                <a href="premium.html" class="nav-link">
                    Pro Upgrade
                </a>

            </nav>

        </aside>

        <!-- Main Content -->

        <main class="col-lg-10 p-0">

            <header class="topbar px-4 py-3">

                <h3 class="m-0">
                    Stock Details
                </h3>

            </header>

            <section class="dashboard-content p-4">

                <div class="market-card mb-4">

                    <h2 id="stockSymbol">
                        Loading...
                    </h2>

                    <h1 id="stockPrice">
                        --
                    </h1>

                    <span id="stockChange">
                        --
                    </span>

                </div>

                <div class="chart-card mb-4">

                    <h4 class="mb-3">
                        Price Trend
                    </h4>

                    <canvas id="stockChart"></canvas>

                </div>

                <div class="row g-4">

                    <div class="col-md-6">

                        <div class="market-card">

                            <h5>Open</h5>
                            <h3 id="stockOpen">--</h3>

                        </div>

                    </div>

                    <div class="col-md-6">

                        <div class="market-card">

                            <h5>Close</h5>
                            <h3 id="stockClose">--</h3>

                        </div>

                    </div>

                    <div class="col-md-6">

                        <div class="market-card">

                            <h5>High</h5>
                            <h3 id="stockHigh">--</h3>

                        </div>

                    </div>

                    <div class="col-md-6">

                        <div class="market-card">

                            <h5>Low</h5>
                            <h3 id="stockLow">--</h3>

                        </div>

                    </div>

                </div>

            </section>

        </main>

    </div>

</div>

<script src="js/stock.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
