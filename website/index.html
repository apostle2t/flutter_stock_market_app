<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme.js"></script>
    <title>AetherVest - Dashboard</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom CSS -->
    <link rel="icon" type="image/jpeg" href="images/logo.jpeg">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container-fluid">
    <div class="row vh-100">

        <!-- SIDEBAR -->
        <aside class="col-lg-2 sidebar p-0">

            <div class="logo-section p-4">
                <img src="images/logo.jpeg" alt="AetherVest" class="sidebar-logo">
            </div>

            <nav class="nav flex-column px-3 mt-3">

                <a href="index.html" class="nav-link active-nav">
                    🏠 Dashboard
                </a>

                <a href="news.html" class="nav-link">
                    📰 News
                </a>

                <a href="stock.html" class="nav-link">
                    📈 Markets
                </a>

                <a href="portfolio.html" class="nav-link">
                    💼 Portfolio
                </a>

                <a href="profile.html" class="nav-link">
                    👤 Profile
                </a>

            </nav>

        </aside>

        <!-- MAIN CONTENT -->
        <main class="col-lg-10 p-0">

            <!-- TOPBAR -->
            <header class="topbar px-4 py-3">

                <div class="row align-items-center">

                    <div class="col-lg-6">

                        <input
                            type="text"
                            class="form-control"
                            id="searchInput"
                            placeholder="Search companies, symbols or countries..."
                        >

                    </div>

                    <div class="col-lg-6">

                        <div class="d-flex justify-content-end gap-2 mt-3 mt-lg-0">

                            <select class="form-select w-auto" id="currencySelect">
                                <option>USD</option>
                                <option>EUR</option>
                                <option>GBP</option>
                            </select>

                            <button class="theme-toggle-btn" id="themeToggleBtn" title="Toggle theme"></button>

                        </div>

                    </div>

                </div>

            </header>

            <!-- DASHBOARD CONTENT -->
            <section class="dashboard-content p-4">

                <!-- Welcome -->
                <div class="mb-4">

                    <h1 class="fw-bold">
                        Welcome Back
                    </h1>

                    <p id="currentDate">
                        Loading date...
                    </p>

                    <p id="userLocation" class="text-secondary">
                        Detecting location...
                    </p>

                </div>

                <!-- Market Overview -->
                <h3 class="section-title mb-3">
                    Market Overview
                </h3>

                <div class="row g-4 mb-5" id="marketOverview"></div>

                <!-- Chart -->
                <div class="chart-card mb-5">

                    <div class="d-flex justify-content-between align-items-center mb-3">

                        <h3 class="m-0">
                            Market Performance
                        </h3>

                        <div>

                            <button class="btn btn-sm btn-primary range-btn active" data-range="1D">
                                1D
                            </button>

                            <button class="btn btn-sm btn-outline-light range-btn" data-range="1W">
                                1W
                            </button>

                            <button class="btn btn-sm btn-outline-light range-btn" data-range="1M">
                                1M
                            </button>

                            <button class="btn btn-sm btn-outline-light range-btn" data-range="1Y">
                                1Y
                            </button>

                        </div>

                    </div>

                    <canvas id="marketChart"></canvas>

                </div>
                <!-- News Preview -->
                <div class="d-flex justify-content-between align-items-center mb-3">

                    <h3 class="section-title">
                        Latest News
                    </h3>

                    <a href="news.html" class="btn btn-primary">
                        View All
                    </a>

                </div>

                <div class="row g-4" id="newsContainer">
                </div>

            </section>

        </main>

    </div>
</div>

<script src="js/search.js"></script>
<script src="js/cache.js"></script>
<script src="js/app.js"></script>
<script src="js/currency.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
