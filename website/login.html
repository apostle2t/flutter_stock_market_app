<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme.js"></script>
    <title>AetherVest Login</title>

    <link rel="icon" type="image/jpeg" href="images/logo.jpeg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid vh-100 d-flex justify-content-center align-items-center">

    <div class="market-card" style="width:450px; max-width:95%;">

        <div class="text-center mb-4">

            <img
                src="images/logo.jpeg"
                alt="AetherVest"
                class="login-logo mb-3"
            >

            <p class="text-secondary">
                Sign in to access your portfolio and market insights
            </p>

        </div>

        <form id="loginForm">

            <div id="loginAlert" class="alert d-none mb-3" role="alert"></div>

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    required
                >

                <div class="form-text text-danger d-none" id="emailError"></div>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    required
                >

                <div class="form-text text-danger d-none" id="passwordError"></div>

            </div>

            <button
                type="submit"
                class="btn btn-primary w-100">

                Login

            </button>

        </form>

        <div class="text-center mt-4">

            <a href="index.html"
               class="text-decoration-none">

                Continue as Guest

            </a>

        </div>

    </div>

</div>

<script src="js/login.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
