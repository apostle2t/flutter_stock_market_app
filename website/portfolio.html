<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherVest - Portfolio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid">

    <div class="row vh-100">

        <aside class="col-lg-2 sidebar p-0">

            <div class="logo-section p-4">
                <h3 class="fw-bold m-0">AetherVest</h3>
            </div>

            <nav class="nav flex-column px-3 mt-3">

                <a href="index.html" class="nav-link">
                    Dashboard
                </a>

                <a href="news.html" class="nav-link">
                    News
                </a>

                <a href="stock.html" class="nav-link">
                    Markets
                </a>

                <a href="portfolio.html" class="nav-link active-nav">
                    Portfolio
                </a>

                <a href="premium.html" class="nav-link">
                    Pro Upgrade
                </a>

            </nav>

        </aside>

        <main class="col-lg-10 p-0">

            <header class="topbar px-4 py-3">
                <h2 class="m-0">Portfolio</h2>
            </header>

            <section class="dashboard-content p-4">

                <div class="row g-4 mb-4">

                    <div class="col-md-4">
                        <div class="market-card">
                            <h6>Total Value</h6>
                            <h2 id="portfolioValue">$125,430</h2>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="market-card">
                            <h6>Total Gain</h6>
                            <h2 class="positive">+$8,240</h2>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="market-card">
                            <h6>Performance</h6>
                            <h2 class="positive">+7.03%</h2>
                        </div>
                    </div>

                </div>

                <div class="chart-card mb-4">

                    <h4 class="mb-3">
                        Portfolio Performance
                    </h4>

                    <canvas id="portfolioChart"></canvas>

                </div>

                <div class="market-card">

                    <h4 class="mb-4">
                        Holdings
                    </h4>

                    <div class="table-responsive">

                        <table class="table table-dark align-middle">

                            <thead>

                                <tr>
                                    <th>Symbol</th>
                                    <th>Shares</th>
                                    <th>Price</th>
                                    <th>Value</th>
                                </tr>

                            </thead>

                            <tbody id="holdingsTable">

                                <tr>
                                    <td>AAPL</td>
                                    <td>50</td>
                                    <td>$210.40</td>
                                    <td>$10,520</td>
                                </tr>

                                <tr>
                                    <td>TSLA</td>
                                    <td>30</td>
                                    <td>$320.80</td>
                                    <td>$9,624</td>
                                </tr>

                                <tr>
                                    <td>NVDA</td>
                                    <td>25</td>
                                    <td>$156.90</td>
                                    <td>$3,922</td>
                                </tr>

                                <tr>
                                    <td>MSFT</td>
                                    <td>20</td>
                                    <td>$485.30</td>
                                    <td>$9,706</td>
                                </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </section>

        </main>

    </div>

</div>

<script src="js/portfolio.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
