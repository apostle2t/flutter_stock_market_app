<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme.js"></script>
    <title>AetherVest - News</title>
 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
 
    <link rel="icon" type="image/jpeg" href="images/logo.jpeg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
 
<div class="container-fluid">
 
    <div class="row vh-100">
 
        <aside class="col-lg-2 sidebar p-0">
 
            <div class="logo-section p-4">
                <img src="images/logo.jpeg" alt="AetherVest" class="sidebar-logo">
            </div>
 
            <nav class="nav flex-column px-3 mt-3">
 
                <a href="index.html" class="nav-link">🏠 Dashboard</a>
 
                <a href="news.html" class="nav-link active-nav">📰 News</a>
 
                <a href="stock.html" class="nav-link">📈 Markets</a>
 
                <a href="portfolio.html" class="nav-link">💼 Portfolio</a>
 
                <a href="profile.html" class="nav-link">👤 Profile</a>
 
            </nav>
 
        </aside>
 
        <main class="col-lg-10 p-0">
 
            <header class="topbar px-4 py-3">

                <div class="row align-items-center">

                    <div class="col-lg-4">
                        <h2 class="m-0">Market News</h2>
                    </div>

                    <div class="col-lg-7">
                        <input
                            type="text"
                            class="form-control"
                            id="searchInput"
                            placeholder="Search companies, symbols or countries..."
                        >
                    </div>

                    <div class="col-lg-1 d-flex justify-content-end mt-3 mt-lg-0">
                        <button class="theme-toggle-btn" id="themeToggleBtn" title="Toggle theme"></button>
                    </div>

                </div>
 
            </header>
 
            <section class="dashboard-content p-4">
 
                <div class="mb-4">
 
                    <input
                        type="text"
                        class="form-control"
                        id="newsSearch"
                        placeholder="Search news..."
                    >
 
                </div>
 
                <div class="d-flex gap-2 flex-wrap mb-4">
 
                    <button class="btn btn-primary category-btn" data-category="stock market">
                        Markets
                    </button>
 
                    <button class="btn btn-outline-light category-btn" data-category="technology">
                        Technology
                    </button>
 
                    <button class="btn btn-outline-light category-btn" data-category="cryptocurrency">
                        Crypto
                    </button>
 
                    <button class="btn btn-outline-light category-btn" data-category="economy">
                        Economy
                    </button>
 
                </div>
 
                <div class="row g-4" id="newsContainer"></div>
 
            </section>
 
        </main>
 
    </div>
 
</div>
 
<script src="js/search.js"></script>
<script src="js/news.js"></script>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
 
</body>
</html>
